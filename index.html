<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CricketLiveLoad</title><style>:root{--bg:#080b12;--surface:#0f1420;--surface2:#151c2e;--border:#1e2a40;--accent:#00e5a0;--red:#ff4757;--blue:#2196f3;--text:#e2e8f5;--text2:#6b7a99}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:sans-serif;min-height:100vh}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}@keyframes spin{to{transform:rotate(360deg)}}header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}.logo{font-size:18px;font-weight:700;color:var(--accent)}.logo span{color:var(--text2)}.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}.header-right{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}.menu-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:18px}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}.overlay.open{display:block}.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;position:fixed;top:52px;left:0;bottom:0;z-index:160;transform:translateX(-100%);transition:transform .3s}.sidebar.open{transform:translateX(0)}.search-box{padding:10px;border-bottom:1px solid var(--border)}.search-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none}.comp-group{border-bottom:1px solid var(--border)}.comp-title{padding:8px 14px;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}.badge{background:var(--border);color:var(--text2);padding:1px 6px;border-radius:8px;font-size:9px}.match-row{padding:10px 14px 10px 20px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}.match-row:hover,.match-row.active{background:var(--surface2);border-left-color:var(--accent)}.match-row .mname{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px}.match-row .mtime{font-size:11px;color:var(--text2)}.live-pill{display:inline-block;background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;animation:blink 1.2s infinite}.main{padding:12px;background:var(--bg);min-height:calc(100vh - 52px)}.match-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}.match-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--accent),var(--red))}.match-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:12px;line-height:1.2}.match-title .vs{color:var(--text2);font-size:16px;margin:0 6px}.prob-bar{display:flex;border-radius:4px;overflow:hidden;height:26px;margin-bottom:6px}.prob-b{background:linear-gradient(90deg,#0d2a4a,var(--blue));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:width .6s}.prob-r{background:linear-gradient(90deg,#4a0d0d,var(--red));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:width .6s}.prob-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:12px}.mkt-btns{display:flex;gap:8px;justify-content:center}.mkt-btn{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2)}.mkt-btn.active{background:var(--surface2);border-color:var(--accent);color:var(--accent)}.team-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}.team-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end}.tname{font-size:18px;font-weight:700}.tb-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}.tb-val{font-size:15px;font-weight:600;color:var(--accent)}.pl-pos{color:var(--accent);font-size:13px;font-weight:600}.pl-neg{color:var(--red);font-size:13px;font-weight:600}.odds-tbl{width:100%;border-collapse:collapse}.odds-tbl th{padding:6px 10px;font-size:9px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border)}.odds-tbl td{padding:6px 10px;font-size:13px;border-bottom:1px solid rgba(30,42,64,.5)}.odds-tbl tr:last-child td{border-bottom:none}.back-tag{background:rgba(33,150,243,.15);color:var(--blue);padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;border:1px solid rgba(33,150,243,.3)}.lay-tag{background:rgba(255,71,87,.15);color:var(--red);padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;border:1px solid rgba(255,71,87,.3)}.tc{color:var(--text2);font-size:11px}.status-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;margin-bottom:12px;font-size:11px;color:var(--text2);flex-wrap:wrap}.s-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}.snap-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}.snap-title{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}.snap-teams{display:grid;grid-template-columns:1fr 1fr;gap:8px}.snap-team{background:var(--bg);border-radius:7px;padding:9px 10px;border:1px solid var(--border)}.stn{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}.stv{font-size:14px;font-weight:600}.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2);gap:14px}.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}.empty{text-align:center;padding:40px 20px;color:var(--text2)}.empty h3{font-size:20px;color:var(--text);margin-bottom:8px}.hint{margin-top:12px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;display:inline-block}.sec-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px}.rbtn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:4px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}</style></head><body><div class="overlay" id="overlay" onclick="closeSidebar()"></div><header><div style="display:flex;align-items:center;gap:10px"><button class="menu-btn" onclick="toggleSidebar()">☰</button><div class="logo">Cricket<span>LiveLoad</span>.com</div></div><div class="header-right"><div class="live-dot"></div><span id="lastUpdate">Live</span></div></header><div class="sidebar" id="sidebar"><div class="search-box"><input type="text" placeholder="🔍 Search matches..." id="searchInput" oninput="filterMatches()"></div><div id="matchList"><div class="loading" style="padding:24px 16px"><div class="spinner"></div><div style="font-size:11px">Loading...</div></div></div></div><div class="main" id="mainContent"><div class="empty"><h3>🏏 Select a Match</h3><p>Tap ☰ to see matches</p><div class="hint">☰ Menu → Select Match → View Live Data</div></div></div><script>const K='c1ce566bf0mshf3b634301318b84p13ecb3jsnc572410a85dc',HOST='diamond-sports-api-d247-sky-exchange-betfair.p.rapidapi.com',BASE='https://'+HOST,H={'x-rapidapi-key':K,'x-rapidapi-host':HOST};let all=[],selId=null,timer=null;function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open')}async function loadMatches(){try{const r=await fetch(BASE+'/api/v1/sports/lotusmatches?sportsid=4',{headers:H}),d=await r.json();if(d.success&&d.data&&d.data.events){all=d.data.events;renderList(all)}else document.getElementById('matchList').innerHTML='<div style="padding:16px;color:var(--red);font-size:12px;text-align:center">Failed to load</div>'}catch(e){document.getElementById('matchList').innerHTML='<div style="padding:16px;color:var(--red);font-size:12px;text-align:center">Error: '+e.message+'</div>'}}function renderList(matches){if(!matches.length){document.getElementById('matchList').innerHTML='<div style="padding:16px;color:var(--text2);font-size:12px;text-align:center">No matches</div>';return}const g={};matches.forEach(m=>{const c=m.competition_name||'Other';if(!g[c])g[c]=[];g[c].push(m)});let h='';Object.entries(g).forEach(([c,ms])=>{h+='<div class="comp-group"><div class="comp-title">'+c+'<span class="badge">'+ms.length+'</span></div>';ms.forEach(m=>{const n=(m.diamond_match||m.name||'Match'),t=m.diamond_time||'',live=m.in_play===1;h+='<div class="match-row" onclick="sel('+m.event_id+',\''+n.replace(/\'/g,"\\'")+'\')\" id="mr-'+m.event_id+'"><div class="mname">'+n+(live?'<span class="live-pill">LIVE</span>':'')+'</div><div class="mtime">'+t+'</div></div>'});h+='</div>'});document.getElementById('matchList').innerHTML=h}function filterMatches(){const q=document.getElementById('searchInput').value.toLowerCase();renderList(all.filter(m=>(m.diamond_match||m.name||'').toLowerCase().includes(q)))}async function sel(id,name){closeSidebar();document.querySelectorAll('.match-row').forEach(e=>e.classList.remove('active'));const e=document.getElementById('mr-'+id);if(e)e.classList.add('active');selId=id;if(timer)clearInterval(timer);document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><div>Loading odds...</div></div>';await getOdds(id,name);timer=setInterval(()=>getOdds(id,name),8000)}async function getOdds(id,name){try{const r=await fetch(BASE+'/api/v1/sports/betfairtodiamond?eventid='+id+'&sid=4',{headers:H}),d=await r.json();if(d.success&&d.data&&d.data.matched){showOdds(d.data.matched,name);document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('en-GB')}else throw new Error(d.message||'No odds data')}catch(e){if(document.getElementById('mainContent').querySelector('.loading')){document.getElementById('mainContent').innerHTML='<div class="empty"><h3>Error</h3><p style="font-size:12px;margin-top:8px">'+e.message+'</p><button class="rbtn" onclick="sel('+id+',\''+name+'\')" style="margin:12px auto;display:block">↻ Retry</button></div>'}}}function showOdds(matched,name){const now=new Date().toLocaleTimeString('en-GB'),sections=matched.section||[],teams=sections.slice(0,2).map(s=>{const backs=(s.odds||[]).filter(o=>o.otype==='back'),lays=(s.odds||[]).filter(o=>o.otype==='lay');return{name:s.nat||'Team',back:backs,lay:lays}});while(teams.length<2){const pts=name.split(' v ');teams.push({name:pts[teams.length]?.trim()||'Team '+(teams.length+1),back:[],lay:[]})}const probs=teams.map(t=>{const b=t.back[0];return b?100/b.odds:50}),tot=probs.reduce((a,b)=>a+b,0)||100,np=probs.map(p=>p/tot*100);let h='<div class="status-bar"><div class="s-dot"></div><span>Live • '+now+'</span><button class="rbtn" onclick="getOdds('+selId+',\''+name+'\')" style="margin-left:auto">↻</button></div><div class="match-header"><div class="match-title">'+teams[0].name+' <span class="vs">v</span> '+teams[1].name+'</div><div class="prob-bar"><div class="prob-b" style="width:'+np[0].toFixed(1)+'%">'+np[0].toFixed(1)+'%</div><div class="prob-r" style="width:'+np[1].toFixed(1)+'%">'+np[1].toFixed(1)+'%</div></div><div class="prob-labels"><span style="color:var(--blue)">'+teams[0].name+': '+np[0].toFixed(1)+'%</span><span style="color:var(--red)">'+teams[1].name+': '+np[1].toFixed(1)+'%</span></div><div class="mkt-btns"><button class="mkt-btn active">Show Scoreboard</button><button class="mkt-btn">▶ Watch Live</button></div></div>';teams.forEach(team=>{const allO=[...team.back.map(o=>({price:o.odds,size:o.size,type:'BACK'})),...team.lay.map(o=>({price:o.odds,size:o.size,type:'LAY'}))].sort((a,b)=>b.price-a.price),tb=allO.reduce((s,o)=>s+o.size,0);h+='<div class="team-card"><div class="team-head"><div class="tname">'+team.name+'</div><div style="text-align:right"><div class="tb-label">TOTAL BET</div><div class="tb-val">'+fmt(tb)+'</div><div class="pl-pos">P/L: '+fmt(tb*.88)+'</div></div></div><table class="odds-tbl"><tr><th>Price</th><th>Size</th><th>Type</th><th>Time</th></tr>';if(!allO.length)h+='<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:14px;font-size:11px">No orders</td></tr>';allO.forEach(o=>{h+='<tr><td>'+o.price.toFixed(2)+'</td><td>'+fmt(o.size)+'</td><td><span class="'+(o.type==='BACK'?'back-tag':'lay-tag')+'">'+o.type+'</span></td><td class="tc">'+now+'</td></tr>'});h+='</table></div>'});const t1b=teams[0].back.reduce((s,o)=>s+o.size,0),t2b=teams[1].back.reduce((s,o)=>s+o.size,0),t1l=teams[0].lay.reduce((s,o)=>s+o.size,0),t2l=teams[1].lay.reduce((s,o)=>s+o.size,0);h+='<div class="sec-title">In-Play Snapshot</div><div class="snap-card"><div class="snap-title">Total Bet Snapshot</div><div class="snap-teams"><div class="snap-team"><div class="stn">'+teams[0].name+'</div><div class="stv" style="color:var(--accent)">'+fmt(t1b+t1l)+'</div></div><div class="snap-team"><div class="stn">'+teams[1].name+'</div><div class="stv" style="color:var(--accent)">'+fmt(t2b+t2l)+'</div></div></div></div><div class="snap-card"><div class="snap-title">P/L Snapshot</div><div class="snap-teams"><div class="snap-team"><div class="stn">'+teams[0].name+'</div><div class="stv pl-neg">-'+fmt(t1l*.05)+'</div></div><div class="snap-team"><div class="stn">'+teams[1].name+'</div><div class="stv pl-pos">'+fmt(t2b*.05)+'</div></div></div></div>';document.getElementById('mainContent').innerHTML=h}function fmt(n){const x=parseFloat(n)||0;if(x>=1e6)return(x/1e6).toFixed(2)+'M';if(x>=1e3)return(x/1e3).toFixed(2)+'K';return x.toFixed(2)}loadMatches();setInterval(loadMatches,60000)</script></body></html>
